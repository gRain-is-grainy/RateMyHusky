<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Maintenance — RateMyHusky</title>
  <script>
    // ── Maintenance Config ────────────────────────────────────
    // Change EST_TIME to whatever fits (e.g. "~30 minutes", "a few hours")
    // Leave it as an empty string "" to hide the ETA badge entirely.
    var MAINTENANCE_EST_TIME = "a few minutes";
    // ─────────────────────────────────────────────────────────
  </script>
  <link rel="icon" href="/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #d6394c;
      --red-dark:   #b82e3f;
      --red-alpha:  rgba(214, 57, 76, 0.1);
      --bg:         #f5f5f5;
      --card-bg:    #ffffff;
      --card-border:#e8e8e8;
      --visual-bg:  #f8f8f8;
      --h1:         #1f1f1f;
      --body:       #666666;
      --shadow:     rgba(0, 0, 0, 0.08);
      --shadow-vis: rgba(0, 0, 0, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #1a1a1a;
        --card-bg:    #242424;
        --card-border:#333333;
        --visual-bg:  #2a2a2a;
        --h1:         #f3f3f3;
        --body:       #b0b0b0;
        --shadow:     rgba(0, 0, 0, 0.28);
        --shadow-vis: rgba(0, 0, 0, 0.32);
      }
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
    }

    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Navbar ────────────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      .navbar {
        background: rgba(26, 26, 26, 0.88);
        border-bottom-color: rgba(255, 255, 255, 0.06);
      }
    }

    .navbar-logo {
      font-size: 1.25rem;
      font-weight: 900;
      text-decoration: none;
      color: var(--h1);
      letter-spacing: -0.02em;
    }

    .navbar-logo span {
      color: var(--red);
    }

    /* ── Main ──────────────────────────────────────────────── */
    .main {
      position: relative;
      flex: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 112px 24px 72px;
      overflow: hidden;
    }

    .main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(214, 57, 76, 0.12) 0, transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(214, 57, 76, 0.08) 0, transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.82) 0%, rgba(245,245,245,0.96) 100%);
      pointer-events: none;
    }

    @media (prefers-color-scheme: dark) {
      .main::before {
        background:
          radial-gradient(circle at 18% 20%, rgba(214, 57, 76, 0.18) 0, transparent 28%),
          radial-gradient(circle at 82% 14%, rgba(214, 57, 76, 0.12) 0, transparent 24%),
          linear-gradient(180deg, rgba(23,23,23,0.94) 0%, rgba(28,28,28,0.98) 100%);
      }
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 0 clamp(16px, 3vw, 48px);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 36px;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      padding: 42px;
      box-shadow: 0 24px 60px var(--shadow);
      position: relative;
      z-index: 2;
    }

    /* ── Copy ──────────────────────────────────────────────── */
    .copy { max-width: 580px; }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--red-alpha);
      color: var(--red);
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 18px;
    }

    .kicker::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      /* pulse animation */
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    .copy h1 {
      font-size: clamp(2.9rem, 7vw, 5.3rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      color: var(--h1);
      margin-bottom: 18px;
    }

    .copy p {
      font-size: 1.08rem;
      line-height: 1.7;
      color: var(--body);
      max-width: 48ch;
    }

    .eta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 12px 18px;
      border-radius: 14px;
      background: var(--red-alpha);
      border: 1px solid rgba(214, 57, 76, 0.18);
      color: var(--red);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .eta svg { flex-shrink: 0; }

    /* ── Visual ────────────────────────────────────────────── */
    .visual {
      position: relative;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .visual-glow {
      position: absolute;
      inset: 12% 10%;
      background: radial-gradient(circle, rgba(214, 57, 76, 0.2) 0%, rgba(214, 57, 76, 0.03) 56%, transparent 74%);
      filter: blur(8px);
    }

    .visual-card {
      position: relative;
      width: min(100%, 450px);
      aspect-ratio: 0.95;
      padding: 28px;
      border-radius: 30px;
      background: var(--visual-bg);
      border: 1px solid rgba(214, 57, 76, 0.12);
      box-shadow: 0 28px 48px var(--shadow-vis);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
      .visual-card { border-color: rgba(214, 57, 76, 0.18); }
    }


    /* ── Visual card contents ──────────────────────────────── */
    .maint-husky {
      position: relative;
      z-index: 1;
      width: clamp(200px, 64%, 300px);
      filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.12));
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    /* Spinning gear badge */
    .gear-badge {
      position: absolute;
      bottom: 22px;
      right: 22px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(214, 57, 76, 0.38);
    }

    .gear-spin {
      animation: spin 4s linear infinite;
      transform-origin: 35px 35px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Wrench badge */
    .wrench-badge {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 46px;
      height: 46px;
      border-radius: 13px;
      background: rgba(214, 57, 76, 0.1);
      border: 1.5px solid rgba(214, 57, 76, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: wrench-rock 3.5s ease-in-out infinite;
    }

    @keyframes wrench-rock {
      0%, 100% { transform: rotate(-12deg); }
      50%       { transform: rotate(12deg); }
    }

    /* ── Footer ────────────────────────────────────────────── */
    .footer {
      padding: 24px;
      text-align: center;
      font-size: 0.83rem;
      color: var(--body);
      border-top: 1px solid var(--card-border);
    }

    .footer a {
      color: var(--red);
      text-decoration: none;
      font-weight: 700;
    }

    .footer a:hover { text-decoration: underline; }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 980px) {
      .main  { padding-top: 96px; }
      .hero  { grid-template-columns: 1fr; padding: 32px; }
      .copy  { max-width: none; }
      .copy p { max-width: none; }
      .visual { min-height: 360px; }
    }

    @media (max-width: 640px) {
      .main { padding: 88px 16px 56px; }
      .hero { gap: 26px; padding: 24px; border-radius: 24px; }
      .copy h1 { font-size: clamp(2.5rem, 14vw, 3.6rem); }
      .copy p  { font-size: 1rem; }
      .visual-card { width: 100%; padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <nav class="navbar" aria-label="Site navigation">
      <a href="/" class="navbar-logo">Rate<span>MyHusky</span></a>
    </nav>

    <main class="main">
      <div class="shell">
        <div class="hero">

          <div class="copy">
            <span class="kicker">Scheduled Maintenance</span>
            <h1>We'll be right&nbsp;back.</h1>
            <p>
              RateMyHusky is temporarily offline while we perform scheduled
              maintenance. We're working quickly to get things back up, thanks
              for your patience.
            </p>
            <div class="eta" id="eta-badge" aria-live="polite">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              Expected downtime: <span id="eta-text">a few minutes</span>
            </div>
            <script>
              (function () {
                var badge = document.getElementById('eta-badge');
                var text  = document.getElementById('eta-text');
                if (!MAINTENANCE_EST_TIME) {
                  badge.style.display = 'none';
                } else {
                  text.textContent = MAINTENANCE_EST_TIME;
                }
              })();
            </script>
          </div>

          <div class="visual" aria-hidden="true">
            <div class="visual-glow"></div>
            <div class="visual-card">

              <!-- Husky (same asset as 404 page) -->
              <img src="/neu-husky-icon.png" alt="" class="maint-husky" />

              <!-- Spinning gear badge -->
              <div class="gear-badge">
                <svg width="38" height="38" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <g class="gear-spin">
                    <path d="M54.75,31.87 L62.85,32.07 L62.85,37.93 L54.75,38.13
                      L53.67,42.17 L60.57,46.39 L57.65,51.46 L50.54,47.59
                      L47.59,50.54 L51.46,57.65 L46.39,60.57 L42.17,53.67
                      L38.13,54.75 L37.93,62.85 L32.07,62.85 L31.87,54.75
                      L27.83,53.67 L23.61,60.57 L18.54,57.65 L22.41,50.54
                      L19.46,47.59 L12.35,51.46 L9.43,46.39 L16.33,42.17
                      L15.25,38.13 L7.15,37.93 L7.15,32.07 L15.25,31.87
                      L16.33,27.83 L9.43,23.61 L12.35,18.54 L19.46,22.41
                      L22.41,19.46 L18.54,12.35 L23.61,9.43 L27.83,16.33
                      L31.87,15.25 L32.07,7.15 L37.93,7.15 L38.13,15.25
                      L42.17,16.33 L46.39,9.43 L51.46,12.35 L47.59,19.46
                      L50.54,22.41 L57.65,18.54 L60.57,23.61 L53.67,27.83 Z"
                      fill="rgba(255,255,255,0.9)"/>
                    <circle cx="35" cy="35" r="9" fill="rgba(214,57,76,0.6)"/>
                    <circle cx="35" cy="35" r="4.5" fill="rgba(255,255,255,0.7)"/>
                  </g>
                </svg>
              </div>

              <!-- Wrench badge -->
              <div class="wrench-badge">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d6394c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                  <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                </svg>
              </div>

            </div>
          </div>

        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Questions? Reach us at <a href="mailto:contact@ratemyhusky.com">contact@ratemyhusky.com</a></p>
    </footer>

  </div>
</body>
</html>
